<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Message For You</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BACKGROUND DECORATIONS -->
  <div class="decorations">
    <svg class="sketch star1" width="30" height="30" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star2" width="24" height="24" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star3" width="32" height="32" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star4" width="28" height="28" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star5" width="22" height="22" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>

    <svg class="sketch spiral1" width="35" height="35" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral2" width="40" height="40" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral3" width="30" height="30" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral4" width="35" height="35" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>

  <div class="container">
    
    <!-- === SCREEN 1: ENVELOPE INTERACTIVE === -->
    <section id="screen-main" class="screen">
      <h1 class="message-prompt">You have a new message.</h1>
      
      <div class="main-layout">
        <div class="envelope-wrapper">
          <div class="envelope-body">
            <!-- SVG paths creating the realistic overlapping folded envelope flaps -->
            <svg class="envelope-flap" viewBox="0 0 320 220">
              <!-- Top Flap Pointing Down to Center -->
              <polygon points="0,0 160,115 320,0" class="flap-line" />
              <!-- Bottom/Side Flap accents -->
              <path d="M0,220 L110,130" class="flap-line" />
              <path d="M320,220 L210,130" class="flap-line" />
            </svg>
            
            <!-- Hand-drawn Flower Seal Over Flap Apex -->
            <svg class="flower-seal" viewBox="0 0 24 24">
              <path d="M12,9 C10.5,6 7,7 8.5,10 C6,9.5 5,13 8,12 C6.5,14.5 10,16.5 11,13.5 C12,16.5 15.5,14.5 14,12 C17,13 16,9.5 13.5,10 C15,7 11.5,6 12,9 Z" stroke="#B46A72" stroke-width="1.2" fill="none" />
              <circle cx="12" cy="11.5" r="2" fill="#FFF7E6"/>
            </svg>
          </div>
        </div>

        <div class="interaction-box">
          <p class="open-text">Open?</p>
          <div class="button-group">
            <button class="btn" id="btn-yes">Yes</button>
            <button class="btn" id="btn-no">No</button>
          </div>
        </div>
      </div>
    </section>

    <!-- === SCREEN 2: CELEBRATION CARD REVEAL === -->
    <section id="screen-birthday" class="screen hidden">
      <div class="card-display">
        <div class="card-text text-left">HAPPY</div>
        
        <div class="cake-center">
          <svg class="cake-drawing" viewBox="0 0 120 120">
            <path class="flame" d="M60,22 C57,28 60,34 60,34 C60,34 63,28 60,22 Z" />
            <line class="candle" x1="60" y1="34" x2="60" y2="55" stroke-width="3" stroke-linecap="round" />
            <path class="cake-body" d="M25,75 C25,65 95,65 95,75 C95,85 25,85 25,75 Z" stroke-width="2.5" />
            <line class="cake-crust" x1="25" y1="75" x2="27" y2="100" stroke-width="2.5" />
            <line class="cake-crust" x1="95" y1="75" x2="93" y2="100" stroke-width="2.5" />
            <path class="cake-body" d="M27,100 C27,108 93,108 93,100" stroke-width="2.5" fill="none" />
          </svg>
        </div>
        
        <div class="card-text text-right">BIRTHDAY</div>
      </div>
    </section>

  </div>

  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');
    const screenMain = document.getElementById('screen-main');
    const screenBirthday = document.getElementById('screen-birthday');

    btnYes.addEventListener('click', () => {
      screenMain.classList.add('hidden');
      setTimeout(() => {
        screenBirthday.classList.remove('hidden');
      }, 400);
    });

    const triggerEvasiveMove = () => {
      const offsetX = Math.random() * 130 - 65; 
      const offsetY = Math.random() * 100 - 50; 
      btnNo.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    };

    btnNo.addEventListener('mouseover', triggerEvasiveMove);
    btnNo.addEventListener('click', triggerEvasiveMove);
  </script>
</body>
</html>
