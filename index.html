<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Message For You</title>
  <style>
    /* --- COLOR PALETTE & BASICS --- */
    :root {
      --vanilla-cream: #FFF7E6;
      --blush-petal: #F7C8D3;
      --rosewood: #B46A72;
      --sage-leaf: #A8B58A;
      --misty-sky: #A9B7C6;
      --midnight-lagoon: #2D3A47;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--midnight-lagoon);
      font-family: 'Courier New', Courier, monospace;
      color: var(--vanilla-cream);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- DECORATIVE FLOATING SKETCHES --- */
    .decorations {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .sketch {
      position: absolute;
      opacity: 0.75;
      animation: float 6s ease-in-out infinite alternate;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-15px) rotate(8deg); }
    }

    /* Positioning sketches relative to layout */
    .star1 { top: 15%; left: 10%; fill: var(--rosewood); animation-delay: 0s; }
    .star2 { top: 20%; right: 12%; fill: var(--rosewood); animation-delay: 1.5s; }
    .star3 { bottom: 15%; left: 8%; fill: var(--rosewood); animation-delay: 0.7s; }
    .star4 { bottom: 22%; right: 25%; fill: var(--rosewood); animation-delay: 2.2s; }
    .star5 { bottom: 12%; right: 5%; fill: var(--rosewood); animation-delay: 1.1s; }
    
    .spiral1 { top: 40%; left: 7%; fill: var(--sage-leaf); animation-delay: 0.5s; }
    .spiral2 { top: 25%; right: 38%; fill: var(--sage-leaf); animation-delay: 1.8s; }
    .spiral3 { bottom: 10%; left: 32%; fill: var(--sage-leaf); animation-delay: 2.5s; }
    .spiral4 { top: 15%; right: 8%; fill: var(--sage-leaf); animation-delay: 0.2s; }

    /* --- CONTAINER & SCREENS --- */
    .container {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    /* --- SCREEN 1: ENVELOPE INTERACTIVE --- */
    .message-prompt {
      font-size: 1.8rem;
      color: var(--misty-sky);
      margin-bottom: 2rem;
      letter-spacing: 2px;
      text-align: center;
    }

    .main-layout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      width: 100%;
    }

    .envelope-container {
      width: 320px;
      height: 240px;
      position: relative;
    }

    /* Hand-drawn/sketchy outline border effect */
    .envelope-sketch {
      width: 100%;
      height: 100%;
      border: 3px dashed var(--misty-sky);
      border-radius: 8px;
      position: relative;
      background-color: rgba(255, 247, 230, 0.03);
    }

    /* Envelope lines meeting at center */
    .envelope-sketch::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-bottom: 2px dashed rgba(169, 183, 198, 0.4);
      clip-path: polygon(0 0, 50% 50%, 100% 0);
    }

    /* Flower Seal */
    .flower-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 45px;
      height: 45px;
      fill: var(--blush-petal);
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.15));
    }

    .interaction-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      min-width: 180px;
    }

    .open-text {
      font-size: 1.5rem;
      color: var(--misty-sky);
    }

    .button-group {
      display: flex;
      gap: 1.5rem;
      position: relative;
      width: 100%;
      justify-content: center;
    }

    .btn {
      background: transparent;
      border: 2px solid var(--misty-sky);
      color: var(--vanilla-cream);
      padding: 0.6rem 1.5rem;
      font-size: 1.1rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: rgba(247, 200, 211, 0.15);
      border-color: var(--blush-petal);
      color: var(--blush-petal);
    }

    /* Absolute positioning utility for evasive No button */
    #btn-no {
      position: relative;
      transition: all 0.2s ease;
    }

    /* --- SCREEN 2: BIRTHDAY CARD REVEAL --- */
    .card-display {
      border: 3px solid var(--vanilla-cream);
      padding: 3rem;
      width: 90%;
      max-width: 700px;
      height: 380px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      background-color: rgba(45, 58, 71, 0.95);
    }

    .card-text {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-align: center;
    }

    .text-left {
      color: var(--blush-petal);
    }

    .text-right {
      color: var(--misty-sky);
    }

    .cake-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
    }

    /* --- SVG CAKE STYLING --- */
    .cake-drawing {
      width: 160px;
      height: auto;
    }

    .cake-crust { stroke: var(--rosewood); }
    .cake-body { stroke: var(--vanilla-cream); fill: rgba(255, 247, 230, 0.05); }
    .candle { stroke: var(--misty-sky); }
    
    .flame {
      fill: var(--blush-petal);
      animation: flicker 0.6s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }

    @keyframes flicker {
      0% { transform: scaleY(1) scaleX(1); opacity: 0.9; }
      100% { transform: scaleY(1.2) scaleX(0.95); opacity: 1; filter: drop-shadow(0 0 4px var(--blush-petal)); }
    }
  </style>
</head>
<body>

  <!-- FLOATING SKETCH BACKGROUND DECORATIONS -->
  <div class="decorations">
    <!-- Hand-drawn Star SVGs -->
    <svg class="sketch star1" width="30" height="30" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star2" width="24" height="24" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star3" width="32" height="32" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star4" width="28" height="28" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch star5" width="22" height="22" viewBox="0 0 24 24"><path d="M12 .5l3.4 6.9 7.6 1.1-5.5 5.4 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.4 7.6-1.1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>

    <!-- Hand-drawn Spiral SVGs -->
    <svg class="sketch spiral1" width="35" height="35" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral2" width="40" height="40" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral3" width="30" height="30" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    <svg class="sketch spiral4" width="35" height="35" viewBox="0 0 30 30"><path d="M15,15 C12,12 10,17 13,19 C17,21 21,14 17,10 C12,7 6,14 11,20 C16,25 25,18 21,11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>

  <div class="container">
    
    <!-- === MAIN PAGE / SCREEN 1 === -->
    <section id="screen-main" class="screen">
      <h1 class="message-prompt">You have a new message.</h1>
      
      <div class="main-layout">
        <div class="envelope-container">
          <div class="envelope-sketch">
            <!-- Sketchy flower seal -->
            <svg class="flower-seal" viewBox="0 0 24 24">
              <path d="M12,9 C10.5,6 7,7 8.5,10 C6,9.5 5,13 8,12 C6.5,14.5 10,16.5 11,13.5 C12,16.5 15.5,14.5 14,12 C17,13 16,9.5 13.5,10 C15,7 11.5,6 12,9 Z" stroke="#B46A72" stroke-width="1" />
              <circle cx="12" cy="11.5" r="2" fill="#FFF7E6"/>
            </svg>
          </div>
        </div>

        <div class="interaction-box">
          <p class="open-text">Open?</p>
          <div class="button-group">
            <button class="btn" id="btn-yes">Yes</button>
            <button class="btn" id="btn-no">No</button>
          </div>
        </div>
      </div>
    </section>

    <!-- === CELEBRATION CARD / SCREEN 2 === -->
    <section id="screen-birthday" class="screen hidden">
      <div class="card-display">
        <div class="card-text text-left">HAPPY</div>
        
        <div class="cake-center">
          <!-- Sketchy Birthday Cake Layer & Flame -->
          <svg class="cake-drawing" viewBox="0 0 120 120">
            <!-- Candle & Flame -->
            <path class="flame" d="M60,22 C57,28 60,34 60,34 C60,34 63,28 60,22 Z" />
            <line class="candle" x1="60" y1="34" x2="60" y2="55" stroke-width="3" stroke-linecap="round" />
            
            <!-- Cake Top -->
            <path class="cake-body" d="M25,75 C25,65 95,65 95,75 C95,85 25,85 25,75 Z" stroke-width="2.5" />
            <!-- Cake Slice Side Lines -->
            <line class="cake-crust" x1="25" y1="75" x2="27" y2="100" stroke-width="2.5" />
            <line class="cake-crust" x1="95" y1="75" x2="93" y2="100" stroke-width="2.5" />
            <!-- Cake Base -->
            <path class="cake-body" d="M27,100 C27,108 93,108 93,100" stroke-width="2.5" fill="none" />
          </svg>
        </div>
        
        <div class="card-text text-right">BIRTHDAY</div>
      </div>
    </section>

  </div>

  <!-- --- LOGIC CONTROLLER --- -->
  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');
    const screenMain = document.getElementById('screen-main');
    const screenBirthday = document.getElementById('screen-birthday');

    // Transition smoothly to screen 2
    btnYes.addEventListener('click', () => {
      screenMain.classList.add('hidden');
      setTimeout(() => {
        screenBirthday.classList.remove('hidden');
      }, 400); // Gives time for the fade-out effect
    });

    // Evasive "No" button movement logic
    const moveNoButton = () => {
      // Calculate boundaries within parent container
      const x = Math.random() * 120 - 60; // moves up to 60px left or right
      const y = Math.random() * 100 - 50; // moves up to 50px up or down
      
      btnNo.style.transform = `translate(${x}px, ${y}px)`;
    };

    btnNo.addEventListener('mouseover', moveNoButton);
    btnNo.addEventListener('click', moveNoButton);
  </script>
</body>
</html>
